<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo con gradiente -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ticket" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fondo circular -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>
  
  <!-- Ticket principal -->
  <rect x="96" y="176" width="320" height="160" rx="16" fill="url(#ticket)"/>
  
  <!-- Círculos laterales para efecto de ticket -->
  <circle cx="96" cy="256" r="24" fill="url(#bg)"/>
  <circle cx="416" cy="256" r="24" fill="url(#bg)"/>
  
  <!-- Líneas del ticket -->
  <line x1="144" y1="208" x2="368" y2="208" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="144" y1="256" x2="288" y2="256" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="144" y1="304" x2="368" y2="304" stroke="white" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Línea punteada central -->
  <line x1="256" y1="200" x2="256" y2="312" stroke="white" stroke-width="4" stroke-dasharray="8,8" opacity="0.7"/>
</svg> 